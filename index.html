<meta name="theme-color" content="#0096c7">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FELIPE MELLO">

<style>

:root{
--bg0:#023e8a;
--bg1:#0077b6;
--bg2:#0096c7;
--bg3:#00b4d8;

--card:#0284c733;

--line:#7dd3fc55;

--text:#ffffff;

--muted:rgba(255,255,255,.75);
}

*{
box-sizing:border-box;
}

body{
margin:0;

font-family:"Poppins",sans-serif;

color:var(--text);

background:
linear-gradient(
135deg,
#023e8a 0%,
#0077b6 25%,
#0096c7 60%,
#00b4d8 100%
);

background-attachment:fixed;

min-height:100vh;

overflow-x:hidden;
}

/* FUNDO AZUL BRILHO */

body::before{
content:"";

position:fixed;

inset:0;

background:
radial-gradient(circle at top left, rgba(255,255,255,.10), transparent 35%),
radial-gradient(circle at bottom right, rgba(255,255,255,.08), transparent 30%);

pointer-events:none;
}

/* CONTAINER */

.wrap{
max-width:1100px;

margin:auto;

padding:30px 16px 140px;

text-align:center;

position:relative;

z-index:2;
}

/* TÍTULO */

h1{

font-weight:900;

font-size:clamp(24px,5vw,44px);

text-transform:uppercase;

background:
linear-gradient(
90deg,
#ffffff,
#caf0f8,
#90e0ef
);

-webkit-background-clip:text;

color:transparent;

margin-bottom:10px;

text-shadow:
0 0 20px rgba(255,255,255,.25);

}

/* SUB */

.sub{

color:var(--muted);

font-size:15px;

margin-bottom:25px;

font-weight:600;

}

/* TOOLS */

.tools{

display:flex;

gap:12px;

justify-content:center;

flex-wrap:wrap;

margin-bottom:25px;

}

/* SEARCH */

.search{

width:min(650px,100%);

padding:14px 16px;

border-radius:999px;

background:rgba(0,119,182,.35);

border:1px solid var(--line);

backdrop-filter:blur(14px);

box-shadow:
0 10px 35px rgba(0,180,216,.20);

}

.search input{

width:100%;

border:0;

background:transparent;

color:white;

font-weight:700;

outline:none;

text-align:center;

font-size:15px;

}

.search input::placeholder{
color:rgba(255,255,255,.65);
}

#count{

font-weight:700;

color:white;

}

/* GRID */

#lobby{

display:grid;

gap:20px;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

justify-content:center;

}

/* CARDS */

.app-card{

border-radius:24px;

padding:22px;

cursor:pointer;

background:rgba(2,132,199,.25);

border:1px solid var(--line);

backdrop-filter:blur(16px);

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

gap:16px;

transition:.25s;

min-height:230px;

box-shadow:
0 10px 35px rgba(0,0,0,.18);

}

.app-card:hover{

transform:
translateY(-10px)
scale(1.02);

background:rgba(2,132,199,.38);

box-shadow:
0 20px 70px rgba(0,180,216,.35);

}

/* IMG */

.app-card img{

width:115px;

height:115px;

border-radius:22px;

object-fit:cover;

border:
3px solid rgba(255,255,255,.15);

box-shadow:
0 10px 25px rgba(0,0,0,.20);

}

/* TEXTO APP */

.app-card span{

font-weight:900;

font-size:15px;

text-transform:uppercase;

color:white;

text-shadow:
0 0 10px rgba(255,255,255,.15);

}

/* FOOTER */

.foot{

margin-top:30px;

font-size:13px;

color:rgba(255,255,255,.65);

font-weight:600;

}

/* BOTÃO BAIXAR APP */

#install-app{

position:fixed;

left:0;
right:0;

margin:auto;

bottom:86px;

width:max-content;

display:none;

align-items:center;

justify-content:center;

gap:10px;

padding:15px 26px;

border:0;

border-radius:999px;

background:
linear-gradient(
135deg,
#023e8a,
#00b4d8
);

color:white;

font-family:"Poppins",sans-serif;

font-weight:900;

font-size:15px;

box-shadow:
0 20px 60px rgba(0,180,216,.45);

z-index:999;

cursor:pointer;

transition:.2s;
}

#install-app:hover{
transform:translateY(-5px);
}

#install-help{
position:fixed;
left:50%;
bottom:150px;
transform:translateX(-50%);
max-width:92%;
width:360px;
padding:14px 16px;
border-radius:18px;
background:rgba(2,62,138,.92);
border:1px solid var(--line);
box-shadow:0 20px 60px rgba(0,0,0,.30);
font-weight:700;
font-size:13px;
line-height:1.45;
display:none;
z-index:1000;
}

/* BOTÃO */

#promotor-link{

position:fixed;

left:0;
right:0;

margin:auto;

bottom:20px;

width:max-content;

display:flex;

align-items:center;

justify-content:center;

gap:12px;

padding:16px 28px;

border-radius:999px;

text-decoration:none;

background:
linear-gradient(
135deg,
#00b4d8,
#48cae4
);

color:white;

font-weight:900;

font-size:15px;

box-shadow:
0 20px 60px rgba(0,180,216,.45);

z-index:999;

transition:.2s;

}

#promotor-link:hover{

transform:
translateY(-6px);

box-shadow:
0 28px 80px rgba(0,180,216,.60);

}

#promotor-link img{

width:24px;
height:24px;

}

/* MOBILE */

@media (max-width:768px){

.wrap{
padding:20px 14px 140px;
}

h1{
font-size:26px;
}

.sub{
font-size:14px;
}

.tools{
flex-direction:column;
align-items:center;
}

.search{
width:100%;
}

#lobby{
grid-template-columns:repeat(2,1fr);
gap:16px;
}

.app-card{
min-height:190px;
padding:18px;
}

.app-card img{
width:95px;
height:95px;
}

.app-card span{
font-size:13px;
}

}

</style>
</head>

<script>

let deferredPrompt = null;
const installBtn = document.getElementById("install-app");
const installHelp = document.getElementById("install-help");

function showHelp(message){
  installHelp.textContent = message;
  installHelp.style.display = "block";
  setTimeout(()=>{
    installHelp.style.display = "none";
  }, 6500);
}

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch((error) => {
      console.log("Erro ao registrar Service Worker:", error);
    });
  });
}

window.addEventListener("beforeinstallprompt", (event) => {
  event.preventDefault();
  deferredPrompt = event;
  installBtn.style.display = "flex";
});

window.addEventListener("appinstalled", () => {
  deferredPrompt = null;
  installBtn.style.display = "none";
});

installBtn.addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.style.display = "none";
    return;
  }

  const ua = navigator.userAgent.toLowerCase();
  const isIOS = /iphone|ipad|ipod/.test(ua);

  if (isIOS) {
    showHelp("No iPhone: toque em Compartilhar e depois em ‘Adicionar à Tela de Início’.");
  } else {
    showHelp("No Android/Chrome: toque no menu ⋮ do navegador e escolha ‘Adicionar à tela inicial’ ou ‘Instalar app’.");
  }
});

const lobby = document.getElementById("lobby");

const q = document.getElementById("q");

const count = document.getElementById("count");

function render(list){

lobby.innerHTML = "";

list.forEach(app=>{

const card = document.createElement("div");

card.className = "app-card";

card.innerHTML = `
<img src="${app.img}">
<span>${app.nome}</span>
`;

card.onclick = ()=>{
window.open(app.url,"_blank");
};

lobby.appendChild(card);

});

count.textContent = list.length + " apps";

}

render(apps);

q.addEventListener("input",()=>{

const term = q.value.toLowerCase();

render(
apps.filter(a=>
a.nome.toLowerCase().includes(term)
)
);

});

new Date().getFullYear();

</script>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎰 APPS FELIPE MELLO 🎰</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#bfefff">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="APPS CARLOS">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<style>

:root{
--bg0:#bfefff;
--bg1:#dff6ff;
--blue:#4fc3ff;
--blue2:#7ad7ff;
--gold:#4fc3ff;
--green:#4fc3ff;
--text:#062033;
--muted:rgba(6,32,51,.65);
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:"Poppins",sans-serif;
color:var(--text);
background:linear-gradient(135deg,#bfefff,#dff6ff,#c9f2ff);
min-height:100vh;
}

.wrap{
max-width:1100px;
margin:auto;
padding:30px 16px 140px;
text-align:center;
}

h1{
font-weight:900;
font-size:clamp(24px,5vw,44px);
text-transform:uppercase;
background:linear-gradient(90deg,#36b9ff,#7ad7ff,#4fc3ff);
-webkit-background-clip:text;
color:transparent;
margin-bottom:10px;
}

.sub{
color:var(--muted);
font-size:15px;
margin-bottom:25px;
}

.tools{
display:flex;
gap:12px;
justify-content:center;
flex-wrap:wrap;
margin-bottom:25px;
}

.search{
width:min(650px,100%);
padding:14px 16px;
border-radius:999px;
background:rgba(255,255,255,.55);
border:1px solid rgba(79,195,255,.35);
backdrop-filter:blur(12px);
}

.search input{
width:100%;
border:0;
background:transparent;
color:#062033;
font-weight:700;
outline:none;
text-align:center;
font-size:15px;
}

.search input::placeholder{
color:rgba(6,32,51,.45);
}

#count{
font-weight:700;
color:#0b4f72;
}

#lobby{
display:grid;
gap:20px;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
justify-content:center;
}

/* CARDS */

.app-card{
border-radius:24px;
padding:22px;
cursor:pointer;
background:rgba(255,255,255,.55);
border:1px solid rgba(79,195,255,.35);
backdrop-filter:blur(12px);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:16px;
transition:.25s;
min-height:230px;
box-shadow:0 10px 30px rgba(79,195,255,.12);
}

.app-card:hover{
transform:translateY(-10px);
box-shadow:0 20px 50px rgba(79,195,255,.25);
}

.app-card img{
width:115px;
height:115px;
border-radius:22px;
object-fit:cover;
border:3px solid rgba(79,195,255,.25);
}

.app-card span{
font-weight:900;
font-size:15px;
text-transform:uppercase;
color:#083b58;
}

.foot{
margin-top:30px;
font-size:13px;
color:rgba(6,32,51,.55);
}

/* BOTÃO WHATSAPP */

#promotor-link{
position:fixed;
left:0;
right:0;
margin:auto;
bottom:20px;
width:max-content;
display:flex;
align-items:center;
justify-content:center;
gap:12px;
padding:16px 28px;
border-radius:999px;
text-decoration:none;
background:linear-gradient(135deg,#4fc3ff,#7ad7ff);
color:white;
font-weight:900;
font-size:15px;
box-shadow:0 20px 60px rgba(79,195,255,.35);
z-index:999;
transition:.2s;
}

#promotor-link:hover{
transform:translateY(-6px);
box-shadow:0 28px 70px rgba(79,195,255,.45);
}

#promotor-link img{
width:24px;
height:24px;
}

/* MOBILE */

@media (max-width:768px){

.wrap{
padding:20px 14px 140px;
}

h1{
font-size:26px;
}

.sub{
font-size:14px;
}

.tools{
flex-direction:column;
align-items:center;
}

.search{
width:100%;
}

#lobby{
grid-template-columns:repeat(2,1fr);
gap:16px;
}

.app-card{
min-height:190px;
padding:18px;
}

.app-card img{
width:95px;
height:95px;
}

.app-card span{
font-size:13px;
}

}

</style>
</head>

<body>

<div class="wrap">

<h1>🎰 APPS FELIPE MELLO 🎰</h1>

<p class="sub">
🎲 Escolha seu app e toque para abrir no navegador.
Se precisar de ajuda, chame no WhatsApp.
</p>

<div class="tools">

<div class="search">
<input id="q" type="search" placeholder="Buscar app...">
</div>

<div id="count">0 apps</div>

</div>

<section id="lobby"></section>

<div class="foot">
© <span id="year"></span> • FELIPE MELLO
</div>

</div>

<a id="promotor-link"
href="https://wa.me/5514991203677"
target="_blank"
rel="noopener noreferrer">

<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">

Chame seu Promotor

</a>

<script>

const apps = [

{ nome:"ÁGUIA", img:"https://ugc.production.linktr.ee/aec4543c-8b8c-419f-bcd6-3d6ccd68fcf2_image.png", url:"https://app.aguiaoficial.com/pr/Gw91CpU0" },

{ nome:"FEITICEIRA", img:"https://i.imgur.com/yuRtyY4.png", url:"https://app.feiticeira.club/pr/6jkoxPSE" },

{ nome:"ACERTOS CLUB", img:"https://ugc.production.linktr.ee/9c03d1f1-4005-42f1-a8e3-aec992cda73b_image.png", url:"https://app.acertos.club/pr/D3GVU06m" },

{ nome:"BANCA CERTA", img:"https://ugc.production.linktr.ee/5eedc95b-8974-447c-b595-b9a34393b7e8_image.png", url:"https://app.bancacerta.com/login/register?code=962942" },

{ nome:"SORTE SETE SETE (BARÃO)", img:"https://i.ibb.co/8L2YXgqP/Whats-App-Image-2025-10-13-at-09-30-36.jpg", url:"https://app.sortesete77.com?p=D4TsDAQ8" },

{ nome:"SORTE SETE SETE (TRIVO)", img:"https://i.ibb.co/8L2YXgqP/Whats-App-Image-2025-10-13-at-09-30-36.jpg", url:"https://app.sortebetjb.com/pr/ZjIBGbL5" },

{ nome:"LOTERIA PARA TODOS 9.000", img:"https://i.ibb.co/Gf272658/9x1.jpg", url:"https://paratodosbrasil.vip/convite/6ANFG" },

{ nome:"BICHO MASTER", img:"https://i.imgur.com/e2hrATw.png", url:"https://bichomaster.com/cadastro?vendedor=49" },

{ nome:"PÉ QUENTE (LBR 5000)", img:"https://i.imgur.com/izOilFK.png", url:"https://pequente.jbpixbet.com?c=f650fcfb697d607b7b5ae6df3ded27bb46c0" },

{ nome:"APOSTAS ESPORTIVAS ÁGUIA", img:"https://ugc.production.linktr.ee/c04c4ce7-31d9-4ccd-9508-2d26e840c254_image.png", url:"https://www.aguiaoficial.bet/?affiliate=felipe2pix" },

{ nome:"AA888 (TIGRINHO)", img:"https://i.imgur.com/kpB4Awv.jpeg", url:"https://aa888.uk/?a=v5n9lod6" },

{ nome:"PALPITEIRO", img:"https://i.imgur.com/KoGMPef.jpeg", url:"https://palpiteiro-nu.vercel.app/" },

];

const lobby = document.getElementById("lobby");
const q = document.getElementById("q");
const count = document.getElementById("count");

function render(list){

lobby.innerHTML = "";

list.forEach(app=>{

const card = document.createElement("div");

card.className = "app-card";

card.innerHTML = `
<img src="${app.img}">
<span>${app.nome}</span>
`;

card.onclick = ()=>window.open(app.url,"_blank");

lobby.appendChild(card);

});

count.textContent = list.length + " apps";

}

render(apps);

q.addEventListener("input",()=>{

const term = q.value.toLowerCase();

render(
apps.filter(a=>a.nome.toLowerCase().includes(term))
);

});

document.getElementById("year").textContent = new Date().getFullYear();

</script>

</body>
</html>
